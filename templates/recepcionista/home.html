<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Recepción · Panel</title>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined" rel="stylesheet">

    <style>
        :root{
            --bg-dark: #0f1c3f;
            --bg-medium: #1f335b;
            --text-light: #ffffff;
            --accent-blue: #3a8dff;
            --table-header: #142851;
            --table-row-hover: #2e446d;
            --header-link-color: #a0b3e5;
        }

        *{box-sizing:border-box;margin:0;padding:0}
        body{
            font-family: Arial, Helvetica, sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            overflow:hidden;
        }
        
        .dashboard-container{
            width:100%;
            height:100vh;
            display:flex;
            flex-direction:column;
            background: linear-gradient(180deg, rgba(15,28,63,1) 0%, rgba(13,25,50,0.95) 100%);
        }

        .navbar{
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:10px 20px;
            background: linear-gradient(180deg,var(--bg-medium), rgba(31,51,91,0.9));
            border-bottom:2px solid var(--table-header);
        }
        .brand { display:flex; align-items:center; gap:12px; }
        .logo{
            font-weight:800;
            color:var(--accent-blue);
            font-size:22px;
            background: linear-gradient(90deg,var(--text-light), var(--accent-blue));
            -webkit-background-clip:text;
            background-clip:text;
            -webkit-text-fill-color:transparent;
        }
        .logo-text{ color:var(--header-link-color); font-size:12px; letter-spacing:1px; }

        nav { display:flex; gap:8px; margin-left:18px; align-items:center; }
        nav a{
            color:var(--header-link-color);
            text-decoration:none;
            padding:8px 14px;
            font-weight:700;
            font-size:12px;
            text-transform:uppercase;
            border-radius:4px;
            cursor: pointer;
        }
        nav a.active{
            background:var(--accent-blue);
            color:var(--text-light);
            padding:8px 18px;
        }

        .header-info{ display:flex; align-items:center; gap:12px; color:var(--header-link-color); font-size:13px; }
        .header-info .material-icons-outlined{ font-size:20px; opacity:.9; }

        .main-content{
            flex:1;
            display:grid;
            grid-template-columns:100px 1fr 250px;
            padding:20px;
            gap:0;
        }

        .sidebar{
            background:transparent;
            display:flex;
            flex-direction:column;
            gap:10px;
            align-items:center;
        }
        .sidebar img{
            width:85px;
            height:85px;
            border-radius:50%;
            object-fit:cover;
            border:2px solid var(--accent-blue);
            margin-bottom:10px;
        }
        .sidebar-item{
            padding:12px 6px;
            text-transform:uppercase;
            font-size:12px;
            opacity:.6;
            cursor:pointer;
            color:var(--text-light);
            width:100%;
            text-align:center;
            transition: all 0.2s;
        }
        .sidebar-item.active{
            opacity:1;
            color:var(--accent-blue);
            font-weight:700;
            border-left:4px solid var(--accent-blue);
            background:rgba(58,141,255,0.1);
        }

        .sidebar-item:not(.active) {
            padding-left: 10px;
        }

        .arrival-module{
            padding:0 20px;
            display:flex;
            flex-direction:column;
        }
        .arrival-module h2{
            font-size:18px;
            margin-bottom:12px;
        }
        .table-scroll-wrapper{
            border:1px solid var(--bg-medium);
            flex:1;
            overflow:auto;
            border-radius:6px;
        }
        table.arrivals-table{
            width:100%; border-collapse:collapse; min-width:700px;
        }
        .arrivals-table th, .arrivals-table td{
            padding:12px 16px; border-bottom:1px solid var(--bg-medium);
        }
        .arrivals-table th{
            background:var(--table-header); text-transform:uppercase;
            font-size:12px; letter-spacing:1px;
        }
        .arrivals-table tbody tr:hover{ background:var(--table-row-hover); cursor:pointer; }

        /* 3. Ajuste para el botón BUSCAR RESERVAS (más chico de lo ancho) */
        .btn-primary{
            display: flex;
            justify-content: center;
            margin-top:12px; 
        }
        .btn-primary button {
            background:var(--accent-blue); 
            color:var(--text-light);
            border:none; 
            padding:8px 25px;
            border-radius:6px; 
            font-weight:700;
            text-transform: uppercase; 
            cursor:pointer;
            font-size: 13px;
            width: auto;
        }

        .notifications-panel{
            padding:14px; 
            display:flex; 
            flex-direction:column; 
            align-items:center;
            border-left:1px solid var(--bg-medium); 
            gap:18px; 
        }
        .notifications-panel h4{ 
            color:var(--accent-blue); 
            font-size:16px; 
            margin-bottom: 0;
            letter-spacing: 1px;
        }
        
        .chart-container{
            position:relative; width:150px; height:150px; border-radius:50%;
            border:5px solid rgba(58,141,255,.45);
            display:flex; align-items:center; justify-content:center;
            margin-bottom: 25px; 
        }
        .chart-ring{
            width:100%; height:100%; border-radius:50%;
            background: conic-gradient(var(--accent-blue) 85%, var(--bg-medium) 0);
            transition: background 600ms linear;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .circle-chart{
            position:absolute; width:78%; height:78%; border-radius:50%;
            background:var(--bg-dark); display:flex;
            align-items:center; justify-content:center;
            font-size:28px; font-weight:800; color:var(--accent-blue);
        }

        .action-icons{ 
            display:flex; 
            flex-wrap:nowrap;
            gap:20px;
            justify-content:center; 
        }
        .action-block{ 
            display:flex; 
            flex-direction:column; 
            align-items:center; 
            gap:6px; 
            width:90px;
            cursor: pointer;
        }
        .action-icon{
            width:44px; height:44px; display:flex; align-items:center; justify-content:center;
            background:var(--bg-medium); border-radius:8px;
            border:1px solid rgba(58,141,255,.35);
            color:var(--accent-blue); font-size:22px;
        }
        .action-icon-text{ color:var(--accent-blue); font-size:11px; font-weight:700; }

        /* Mensajes de servicio */
        .service-messages {
            padding: 18px;
            color: var(--text-light);
            font-size: 14px;
            line-height: 1.4;
        }
        .service-messages .msg {
            padding: 10px;
            border-radius: 8px;
            background: rgba(255,255,255,0.03);
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        /* Responsive ajustado (mantener como el original) */
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
                padding: 10px;
                gap: 15px;
                flex-direction: column; 
                overflow-y: auto;
            }
            .sidebar img { display:none; }
        }
        @media (max-width: 700px) {
            .dashboard-container { padding-top: 50px; }
            .navbar { position: fixed; top:0; left:0; width:100%; z-index:1000; padding:8px 15px;}
            .logo-text, .header-info { display:none; }
            .navbar .brand { width:100%; justify-content:center; margin-bottom:5px; }
            .navbar nav { display:none; }
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <header class="navbar">
            <div style="display:flex; align-items:center;">
                <div class="brand">
                    <div class="logo">NÁYARA</div>
                    <div class="logo-text">Hotel</div>
                </div>
                <nav id="main-nav">
                    <a href="/recepcionista/home" class="nav-item active" data-section="reservas">RESERVAS</a>
                    <a href="/recepcionista/checkin" class="nav-item" data-section="checkin">CHECK-IN</a>
                    <a href="/recepcionista/checkout" class="nav-item" data-section="checkout">CHECK-OUT</a>
                    <a href="/recepcionista/reportes/listado" class="nav-item" data-section="reportes">REPORTES</a>
                    <a href="/logout" class="nav-item" data-section="reportes">SALIR</a>
                </nav>
            </div>

            <div class="header-info">
                <div style="text-align:right;">
                    <div style="font-size:13px; font-weight:700;">{{ nombre }}</div>
                    <div class="date-time">303 23:59 | 29-05-18</div>
                </div>
                <span class="material-icons-outlined">search</span>
            </div>
        </header>

        <main class="main-content">

            <aside class="sidebar" id="sidebar">
                <img src="/static/img/nayarane.jpeg" alt="Foto">
                <div class="sidebar-item active" data-content="llegadas">LLEGADAS</div>
                <div class="sidebar-item" data-content="salidas">SALIDAS</div>
                <div class="sidebar-item" data-content="servicio">SERVICIO</div>
            </aside>

            <section class="arrival-module" id="main-module">
                <h2>LLEGADAS</h2>

                <div class="table-scroll-wrapper">
                    <!-- TABLA LLEGADAS -->
                    <table id="arrivals-table" class="arrivals-table">
                        <thead>
                            <tr>
                                <th>HUÉSPED</th>
                                <th>HABITACIÓN TIPO</th>
                                <th>HORA EST.</th>
                                <th>HORA CHECK-IN</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>

                    <!-- TABLA SALIDAS -->
                    <table id="tablaSalidas" class="arrivals-table" style="display:none;">
                        <thead>
                            <tr>
                                <th>HUÉSPED</th>
                                <th>HABITACIÓN TIPO</th>
                                <th>HORA EST.</th>
                                <th>HORA CHECK-OUT</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>

                    <!-- CONTAINER PARA MENSAJES DE SERVICIO (oculto por defecto) -->
                    <div id="serviceContainer" class="service-messages" style="display:none;">
                        <!-- Mensajes se inyectan desde JS -->
                    </div>
                </div>

                <div id="search-button-container" class="btn-primary">
                    <button id="buscarReservasBtn">BUSCAR RESERVAS</button>
                </div>
            </section>

            <aside class="notifications-panel">
                <h4>NOTIFICACIONES</h4>

                <div class="chart-container" aria-hidden="false">
                    <div class="chart-ring" id="chart-ring" role="img" aria-label="Ocupación">
                        <div class="circle-chart" id="occupancy-value">85%</div>
                    </div>
                </div>

                <div class="action-icons">
                    <div class="action-block" id="alert-button">
                        <div class="material-icons-outlined action-icon">notifications</div>
                        <div class="action-icon-text">ALERTAS</div>
                    </div>
                    <div class="action-block" id="service-button">
                        <div class="material-icons-outlined action-icon">fact_check</div>
                        <div class="action-icon-text">SERVICIOS</div>
                    </div>
                </div>
            </aside>

        </main>
    </div>

<script>
document.addEventListener('DOMContentLoaded', () => {

    /* ============================
       Helper: llenar tabla con filas
    ============================ */
    function appendRowToTable(tbody, cells) {
        const tr = document.createElement("tr");
        tr.innerHTML = cells.map(c => `<td>${c}</td>`).join("");
        tbody.appendChild(tr);
    }

    /* =======================================================
       CARGAR LLEGADAS (usa /api/llegadas - ya lo tienes en app.py)
       ======================================================= */
    async function loadArrivalsTable() {
        const tbody = document.querySelector('#arrivals-table tbody');
        tbody.innerHTML = "<tr><td colspan='4'>Cargando...</td></tr>";

        try {
            const res = await fetch("/api/llegadas");
            if (!res.ok) throw new Error("HTTP " + res.status);
            const json = await res.json();

            tbody.innerHTML = "";

            json.data.forEach(row => {
                appendRowToTable(tbody, [
                    row.guest || '',
                    row.roomType || '',
                    row.estimatedTime || '',
                    row.checkinTime || ''
                ]);
            });

            if (json.data.length === 0) {
                tbody.innerHTML = "<tr><td colspan='4' style='text-align:center;'>No hay llegadas hoy.</td></tr>";
            }

        } catch (err) {
            console.error("Error cargando llegadas:", err);
            tbody.innerHTML = "<tr><td colspan='4' style='text-align:center;'>Error al cargar datos</td></tr>";
        }
    }

    /* =======================================================
       CARGAR SALIDAS (usa /api/salidas - crea endpoint en app.py)
       ======================================================= */
    async function cargarSalidas() {
        const tbody = document.querySelector('#tablaSalidas tbody');
        tbody.innerHTML = "<tr><td colspan='4'>Cargando...</td></tr>";

        try {
            const res = await fetch("/api/salidas");
            if (!res.ok) throw new Error("HTTP " + res.status);
            const json = await res.json();

            tbody.innerHTML = "";

            json.data.forEach(item => {
                appendRowToTable(tbody, [
                    item.guest || '',
                    item.roomType || '',
                    item.estimatedTime || '',
                    item.checkoutTime || ''
                ]);
            });

            if (json.data.length === 0) {
                tbody.innerHTML = "<tr><td colspan='4' style='text-align:center;'>No hay salidas hoy.</td></tr>";
            }

        } catch (err) {
            console.error("Error cargando salidas:", err);
            tbody.innerHTML = "<tr><td colspan='4' style='text-align:center;'>Error al cargar datos</td></tr>";
        }
    }

    /* =======================================================
       MENSAJES DE SERVICIO (mostrados como listados, sin headers)
       ======================================================= */
    function loadServiceMessages() {
        const container = document.getElementById("serviceContainer");
        const messages = [
            { text: "Limpieza solicitada — Habitación 101", time: "09:12" },
            { text: "Toallas extra — Habitación 205", time: "09:35" },
            { text: "Reparación de aire — Habitación 302", time: "10:05" }
        ];

        container.innerHTML = messages.map(m => `<div class="msg">${m.text} <div style="opacity:.6; font-size:12px; margin-top:6px;">${m.time}</div></div>`).join("");
    }

    /* =======================================================
       CAMBIAR ENTRE LLEGADAS / SALIDAS / SERVICIO
       - En servicio ocultamos encabezado de tabla y mostramos mensajes
    ======================================================= */
    function updateMainModuleContent(key) {
        const title = document.querySelector("#main-module h2");

        const tLlegadas = document.getElementById("arrivals-table");
        const tSalidas = document.getElementById("tablaSalidas");
        const serviceContainer = document.getElementById("serviceContainer");

        // Aseguramos que los thead estén visibles por defecto
        const arrivalsThead = tLlegadas.querySelector("thead");
        const salidasThead = tSalidas.querySelector("thead");

        switch (key) {
            case "llegadas":
                title.textContent = "LLEGADAS";
                tLlegadas.style.display = "table";
                tSalidas.style.display = "none";
                serviceContainer.style.display = "none";
                arrivalsThead.style.display = "";
                salidasThead.style.display = "";
                loadArrivalsTable();
                break;

            case "salidas":
                title.textContent = "SALIDAS";
                tLlegadas.style.display = "none";
                tSalidas.style.display = "table";
                serviceContainer.style.display = "none";
                arrivalsThead.style.display = "";
                salidasThead.style.display = "";
                cargarSalidas();
                break;

            case "servicio":
                title.textContent = "SOLICITUDES DE SERVICIO";
                tLlegadas.style.display = "table";
                tSalidas.style.display = "none";
                // ocultamos encabezados y mostramos mensajes
                arrivalsThead.style.display = "none";
                salidasThead.style.display = "none";
                serviceContainer.style.display = "block";
                loadServiceMessages();
                // limpiamos cuerpo de arrivals para que no muestre filas de tabla debajo de mensajes
                document.querySelector('#arrivals-table tbody').innerHTML = "";
                break;

            default:
                title.textContent = "MÓDULO PRINCIPAL";
        }
    }

    /* =======================================================
       SIDEBAR: activar botones
    ======================================================= */
    document.querySelectorAll("#sidebar .sidebar-item").forEach(item => {
        item.addEventListener("click", () => {
            document.querySelectorAll("#sidebar .sidebar-item").forEach(i => i.classList.remove("active"));
            item.classList.add("active");
            updateMainModuleContent(item.dataset.content);
        });
    });

    /* =======================================================
       BUSCAR RESERVAS: abre la lista real de reservas
       (si quieres, puedes cambiar a una búsqueda en modal)
    ======================================================= */
    document.getElementById("buscarReservasBtn").addEventListener("click", () => {
        // redirige a la ruta real de tu app
        window.location.href = "/recepcionista/reservas/lista";
    });

    /* =======================================================
       BOTONES DE PANEL (alertas / servicios) - demostración
    ======================================================= */
    document.getElementById("alert-button").addEventListener("click", () => {
        alert("Simulación: Mostrar listado de Alertas del día.");
    });
    document.getElementById("service-button").addEventListener("click", () => {
        // activar la vista SERVICIO para acceso rápido
        const servicioBtn = document.querySelector('#sidebar .sidebar-item[data-content="servicio"]');
        servicioBtn.click();
    });

    /* =======================================================
       GRÁFICA ANIMADA (va del 0% al valor objetivo)
       - animación CSS + JS que pinta el conic-gradient
       - se alimenta con un valor fijo por defecto (85).
       Puedes adaptar para obtener valor real desde un endpoint.
    ======================================================= */
    function animateOccupancy(targetPercent = 85, duration = 900) {
        const ring = document.getElementById("chart-ring");
        const value = document.getElementById("occupancy-value");
        let start = null;
        const initial = 0;
        function step(ts) {
            if (!start) start = ts;
            const progress = Math.min((ts - start) / duration, 1);
            const current = Math.round(initial + (targetPercent - initial) * progress);
            value.textContent = current + "%";
            ring.style.background = `conic-gradient(var(--accent-blue) ${current}%, var(--bg-medium) 0)`;
            if (progress < 1) {
                window.requestAnimationFrame(step);
            }
        }
        window.requestAnimationFrame(step);
    }

    // carga inicial
    updateMainModuleContent("llegadas");
    // animar al 85% (puedes cambiar aquí el número)
    animateOccupancy(85, 900);

    // (Opcional) refrescar datos de llegadas cada cierto tiempo (ej. 60s)
    // setInterval(loadArrivalsTable, 60000);

});
</script>

</body>
</html>
